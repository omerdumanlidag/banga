<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banga Anime - Banga Subs</title>
    <style>
        body { background-color: #050505; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        nav { background: #111; padding: 15px; border-bottom: 2px solid #6c5ce7; text-align: center; font-size: 1.5rem; font-weight: bold; color: #6c5ce7; letter-spacing: 2px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* Video Oynatıcı Alanı */
        .video-container { width: 100%; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid #333; margin-bottom: 15px; box-shadow: 0 0 30px rgba(108, 92, 231, 0.15); }
        iframe { width: 100%; aspect-ratio: 16 / 9; border: none; }

        /* Bölüm Seçme Butonları */
        .episode-nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .ep-btn { background: #222; color: white; border: 1px solid #444; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .ep-btn:hover { background: #6c5ce7; border-color: #6c5ce7; }
        .ep-btn.active { background: #6c5ce7; border-color: #a29bfe; }

        /* Yorum Alanı */
        .comment-section { background: #0f0f0f; border-radius: 10px; padding: 25px; border: 1px solid #222; margin-top: 30px; }
        .comment-input { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 15px; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box; font-size: 1rem; }
        .send-btn { background: #6c5ce7; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; transition: 0.3s; }
        .send-btn:hover { background: #a29bfe; }
        
        .comment-display { margin-top: 25px; border-top: 1px solid #333; padding-top: 20px; }
        .single-comment { background: #161616; padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 5px solid #6c5ce7; }
        .comment-user { color: #a29bfe; font-weight: bold; font-size: 0.95rem; margin-bottom: 6px; }

        .fansub-info { color: #888; font-size: 0.9rem; margin-bottom: 20px; text-align: center; }
        .fansub-info b { color: #6c5ce7; }
    </style>
</head>
<body>

<nav>BANGA ANIME</nav>

<div class="container">
    <!-- Video Oynatıcı -->
    <div class="video-container">
        <iframe id="main-player" src="https://drive.google.com/file/d/1r1R6vWimlZVcIqQNppzL1T3g-V6rVV7Z/preview" allow="autoplay"></iframe>
    </div>

    <div class="fansub-info">Çeviri & Edit: <b>Banga Subs</b></div>

    <!-- Bölüm Seçici -->
    <div class="episode-nav">
        <button class="ep-btn active" onclick="changeEpisode('https://drive.google.com/file/d/1r1R6vWimlZVcIqQNppzL1T3g-V6rVV7Z/preview', this, 'Dandadan 1. Bölüm')">1. Bölüm</button>
        <button class="ep-btn" onclick="changeEpisode('https://drive.google.com/file/d/1x5ky5Eumj3-uZ7kNenThrn7EgHhztU0v/preview', this, 'Dandadan 2. Bölüm')">2. Bölüm</button>
        <button class="ep-btn" onclick="changeEpisode('https://drive.google.com/file/d/11VLIHmbEmrx3L3mPokqkpSbN2smXPg9e/preview', this, 'Dandadan 3. Bölüm')">3. Bölüm</button>
    </div>

    <h2 id="current-title">Dandadan 1. Bölüm</h2>

    <!-- Yorumlar Bölümü -->
    <div class="comment-section">
        <h3 style="margin-top:0;">Yorumlar</h3>
        <input type="text" id="comment-text" class="comment-input" placeholder="Bu bölüm hakkında ne düşünüyorsun?">
        <button onclick="sendComment()" class="send-btn">Yorumu Paylaş</button>
        
        <div id="comment-list" class="comment-display">
            Yorumlar yükleniyor...
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAk1x2v8ji1rlCwsXiRGhTGSL3bBiuakRk",
    authDomain: "banga-8f48d.firebaseapp.com",
    projectId: "banga-8f48d",
    storageBucket: "banga-8f48d.firebasestorage.app",
    messagingSenderId: "795200261757",
    appId: "1:795200261757:web:ed820a5eb1a5f84c7f6b14"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Bölüm Değiştirme Fonksiyonu
  function changeEpisode(url, btn, title) {
      document.getElementById('main-player').src = url;
      document.getElementById('current-title').innerText = title;
      
      // Buton renklerini güncelle
      document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
  }

  // İsim sorma ve Yorumları çekme
  window.onload = function() {
      if (!localStorage.getItem("banga_user")) {
          let name = prompt("Banga Anime'ye hoş geldin! Takma adın nedir?");
          localStorage.setItem("banga_user", name || "Anonim İzleyici");
      }
      loadComments();
  }

  async function sendComment() {
      let user = localStorage.getItem("banga_user");
      let text = document.getElementById("comment-text").value;
      if(text.trim() === "") return;

      await db.collection("comments").add({
          user: user,
          text: text,
          date: new Date()
      });
      document.getElementById("comment-text").value = "";
  }

  function loadComments() {
      db.collection("comments").orderBy("date", "desc").onSnapshot((snapshot) => {
          let list = document.getElementById("comment-list");
          let html = "";
          snapshot.forEach(doc => {
              let d = doc.data();
              html += `<div class="single-comment"><div class="comment-user">${d.user}</div><div>${d.text}</div></div>`;
          });
          list.innerHTML = html || "Henüz yorum yok. İlk yazan sen ol!";
      });
  }
</script>

</body>
</html>
