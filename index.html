<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ANIMIX</title>
    <style>
        /* Arka plan görseli eklendi */
        body { 
            background: url('https://lh3.googleusercontent.com/u/0/d/1Rd77Ua_YrNfq_UQxv5zokzDPSyWE7xOF') no-repeat center center fixed; 
            background-size: cover;
            color: #ccc; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding-bottom: 50px; 
        }
        .top-bar { background: rgba(26, 26, 26, 0.9); color: #ccc; height: 35px; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; font-size: 0.75rem; }
        .user-status { color: #e91e63; font-weight: bold; cursor: pointer; }
        .header-main { background: rgba(17, 17, 17, 0.9); padding: 10px 5%; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
        
        /* Yazı yerine logo görseli ayarı */
        .logo-img { height: 50px; cursor: pointer; object-fit: contain; }
        
        .search-box { background: #222; color: #fff; padding: 10px; border: 1px solid #444; border-radius: 20px; width: 250px; outline: none; }
        .nav-menu { background: rgba(17, 17, 17, 0.9); border-bottom: 3px solid #e91e63; padding: 0 5%; display: flex; align-items: center; }
        .nav-item { padding: 15px 20px; text-decoration: none; color: #bbb; font-weight: bold; font-size: 0.85rem; border-bottom: 3px solid transparent; cursor: pointer; }
        .nav-item:hover, .nav-item.active { color: #e91e63; border-bottom-color: #e91e63; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .anime-card { background: rgba(26, 26, 26, 0.9); border-radius: 5px; overflow: hidden; border: 1px solid #333; cursor: pointer; }
        .anime-card img { width: 100%; height: 320px; object-fit: cover; }
        #video-page { display: none; max-width: 1200px; margin: 20px auto; padding: 0 20px; grid-template-columns: 1fr 320px; gap: 20px; }
        .vid-wrapper { background: #000; aspect-ratio: 16/9; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .sidebar { background: rgba(26, 26, 26, 0.9); border: 1px solid #333; padding: 15px; border-radius: 4px; overflow-y: auto; max-height: 550px; }
        .season-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .season-btn { flex: 1; padding: 8px; background: #333; color: #fff; border: 1px solid #444; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .season-btn.active { background: #e91e63; color: white; border-color: #e91e63; }
        .ep-link { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; font-size: 0.9rem; color: #bbb; }
        .ep-link:hover { background: #222; color: #fff; }
        .comment-section { margin-top: 20px; background: rgba(26, 26, 26, 0.9); padding: 20px; border-radius: 4px; border: 1px solid #333; }
        .comment-box { background: #222; color: #fff; width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #1a1a1a; color: #fff; width: 340px; margin: 10% auto; padding: 30px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .modal-content input { background: #222; color: #fff; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #444; box-sizing: border-box;}
        .btn-main { background: #e91e63; color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; width: 100%; border-radius: 4px; margin-top: 5px;}
    </style>
</head>

<div class="top-bar">
    <div id="welcome-msg">ANIMIX'e Hoş Geldiniz</div>
    <div id="auth-zone">
        <span class="user-status" onclick="openModal('login')">Giriş Yap</span> | 
        <span class="user-status" onclick="openModal('register')">Kayıt Ol</span>
    </div>
</div>

<div class="header-main">
    <!-- Yazı yerine fotoğraf eklendi -->

    <input class="search-box" id="searchInput" onkeyup="filterAnime()" placeholder="Anime ara..." type="text"/>
</div>

<div class="nav-menu">
    <div class="nav-item active" id="nav-home" onclick="showSection('home-page', this)">ANA SAYFA</div>
    <a class="nav-item" href="mailto:omerdumanlidag60@gmail.com" style="text-decoration: none;">DESTEK</a>
</div>

<div class="container" id="home-page">
    <div class="anime-card" data-name="Jujutsu Kaisen" onclick="openAnime('jjk')">
        <img src="https://lh3.googleusercontent.com/u/0/d/1MPh4uOB8tBGo3225v1C1Wz8Uuju-4WMy"/><div style="padding:10px;text-align:center;">Jujutsu Kaisen</div>
    </div>

    </div>
</div>

<div id="video-page">
    <div class="main-content">
        <div class="vid-wrapper"><iframe id="vidFrame" src=""></iframe></div>
        <h2 id="vidTitle">Bölüm Seçin</h2>
        <div class="comment-section">
            <h3>Yorumlar</h3>
            <textarea class="comment-box" id="commentInput" placeholder="Yorumunuzu yazın..."></textarea>
            <button class="btn-main" onclick="postComment()">Yorum Yap</button>
            <div class="comment-list" id="commentList"></div>
        </div>
    </div>
    <div class="sidebar">
        <h3>Bölümler</h3>
        <div class="season-tabs" id="seasonTabs" style="display:none;"></div>
        <div id="epList"></div>
    </div>
</div>

<div class="modal" id="login-modal"><div class="modal-content">
    <h2>Giriş Yap</h2>
    <input id="lUser" placeholder="Kullanıcı Adı" type="text"/>
    <input id="lPass" placeholder="Şifre" type="password"/>
    <button class="btn-main" onclick="login()">Giriş</button>
</div></div>

<div class="modal" id="register-modal"><div class="modal-content">
    <h2>Kayıt Ol</h2>
    <input id="rUser" placeholder="Kullanıcı Adı" type="text"/>

    let currentAnimeId = ""; let currentSeason = 1;

    function updateUI() {
        const u = localStorage.getItem("banga_user");
        if(u) {
            document.getElementById('auth-zone').innerHTML = '<b>' + u + '</b> | <span onclick="logout()" style="cursor:pointer">Çıkış</span>';
        }
    }

    function showSection(id, el) {
        document.querySelectorAll('.container, #video-page').forEach(s=>s.style.display='none');
        document.getElementById(id).style.display = (id==='home-page'||id==='video-page') ? 'grid' : 'block';
        document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active')); 
        if(el) el.classList.add('active');
    }

    function openAnime(id) {
        currentAnimeId = id; currentSeason = 1;
        showSection('video-page');
        const tabs = document.getElementById('seasonTabs');
        const seasons = Object.keys(animeData[id].seasons);
        if(seasons.length > 1) {
            tabs.style.display = 'flex';
            let h = "";
            seasons.forEach(s => h += '<button class="season-btn ' + (s==1?'active':'') + '" onclick="changeSeason(' + s + ')">' + s + '. Sezon</button>');
            tabs.innerHTML = h;
        } else { tabs.style.display = 'none'; }
        loadEpisodes(1); loadComments();
    }

    function changeSeason(s) {
        currentSeason = s;
        document.querySelectorAll('.season-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.includes(s + ".")));
        loadEpisodes(s);
    }

    function loadEpisodes(s) {
        const list = document.getElementById('epList'); list.innerHTML = "";
        animeData[currentAnimeId].seasons[s].forEach(e => {
            let d = document.createElement('div'); d.className="ep-link"; d.innerText=e.t;
            d.onclick=()=>{ document.getElementById('vidFrame').src=e.l; document.getElementById('vidTitle').innerText=e.t; loadComments(); };
            list.appendChild(d);
        });
    }

    function login() {
        const u = document.getElementById('lUser').value.toLowerCase();
        const p = document.getElementById('lPass').value;
        if(localStorage.getItem("db_" + u) === p || (u === "banga subs" && p === "bangasub16")) { 
            localStorage.setItem("banga_user", u); location.reload(); 
        } else alert("Bilgiler hatalı!");
    }
    function register() {
        const u = document.getElementById('rUser').value.toLowerCase().trim();
        const p = document.getElementById('rPass').value;
        if(!u || !p) return alert("Boş bırakmayın!");
        localStorage.setItem("db_" + u, p); localStorage.setItem("banga_user", u); location.reload();
    }
    function logout() { localStorage.removeItem("banga_user"); location.reload(); }
    function openModal(id) { document.getElementById(id+'-modal').style.display='block'; }
    function loadComments() {
        const list = document.getElementById('commentList'); list.innerHTML = "";
        let cms = JSON.parse(localStorage.getItem("comments_" + currentAnimeId) || "[]");
        cms.reverse().forEach(c => list.innerHTML += '<div class="single-comment"><b>' + c.u + ':</b> ' + c.t + '</div>');
    }
    function postComment() {
        const u = localStorage.getItem("banga_user"); const val = document.getElementById('commentInput').value;
        if(!u) return alert("Giriş yapın!");
        let cms = JSON.parse(localStorage.getItem("comments_" + currentAnimeId) || "[]");
        cms.push({u: u, t: val}); localStorage.setItem("comments_" + currentAnimeId, JSON.stringify(cms));
        document.getElementById('commentInput').value = ""; loadComments();
    }
    function filterAnime() {
        let v = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.anime-card').forEach(c => {
            const name = c.getAttribute('data-name').toLowerCase();
            c.style.display = name.includes(v) ? "block" : "none";
        });
    }
    window.onclick = (e) => { if(e.target.className==='modal') document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
    window.onload = updateUI;

</html>
