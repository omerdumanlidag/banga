<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banga Anime - Banga Subs</title>
    <style>
        /* GENEL TASARIM */
        body { background-color: #f4f4f4; color: #333; font-family: Arial, sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* ÜST SİYAH BAR */
        .top-black-bar { background: #1a1a1a; color: #ccc; height: 35px; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; font-size: 0.75rem; }
        .social-icons span { margin-right: 10px; cursor: pointer; }

        /* LOGO VE ARAMA ALANI */
        .header-main { background: white; padding: 20px 5%; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .logo-area h1 { color:#e91e63; margin:0; font-style: italic; cursor: pointer; }
        .search-box { position: relative; width: 300px; }
        .search-box input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 3px; background: #f9f9f9; outline: none; }
        .search-box button { position: absolute; right: 5px; top: 5px; background: none; border: none; cursor: pointer; color: #888; }

        /* PEMBE NAVİGASYON MENÜSÜ */
        .nav-menu { background: white; border-bottom: 3px solid #e91e63; padding: 0 5%; display: flex; gap: 5px; }
        .nav-item { padding: 15px 20px; text-decoration: none; color: #444; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; border-bottom: 3px solid transparent; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { color: #e91e63; border-bottom-color: #e91e63; }

        /* ALFABETİK SIRALAMA */
        .alphabet-bar { background: #333; padding: 10px 5%; display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
        .alpha-btn { background: #444; color: white; border: none; padding: 5px 8px; font-size: 0.7rem; cursor: pointer; border-radius: 2px; }
        .alpha-btn:hover { background: #e91e63; }

        /* İÇERİK ALANI */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        .video-wrapper { background: #000; border-radius: 4px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        iframe { width: 100%; aspect-ratio: 16 / 9; border: none; }

        .sidebar { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 4px; height: fit-content; }
        .sidebar h3 { font-size: 0.9rem; color: #e91e63; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 0; }
        .ep-link { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; display: block; text-decoration: none; color: #555; font-size: 0.85rem; transition: 0.2s; }
        .ep-link:hover { color: #e91e63; background: #f9f9f9; padding-left: 15px; }

        /* YORUM KUTUSU */
        .comment-section { background: white; border: 1px solid #ddd; padding: 20px; margin-top: 20px; border-radius: 4px; }
        .comment-input { width: 100%; padding: 10px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; border-radius: 3px; }
        .btn-post { background: #e91e63; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; border-radius: 3px; }

        .comment-list { margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .c-item { margin-bottom: 15px; font-size: 0.9rem; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        .c-user { color: #e91e63; font-weight: bold; }

        .footer { text-align: center; margin-top: 50px; color: #999; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="top-black-bar">
    <div class="social-icons">
        <span>f</span> <span>t</span> <span>g+</span> <span>i</span> <span>w</span>
    </div>
    <div>Anime İzle</div>
    <div>Giriş yap ya da Kayıt ol</div>
</div>

<div class="header-main">
    <div class="logo-area">
        <h1 onclick="location.reload()">BANGA SUBS</h1>
    </div>
    <div class="search-box">
        <input type="text" id="animeSearch" placeholder="Anime aramak için yazın..." onkeyup="searchAnime()">
        <button>🔍</button>
    </div>
</div>

<div class="nav-menu">
    <a href="#" class="nav-item active" onclick="location.reload()">ANA SAYFA</a>
    <a href="#" class="nav-item">HABERLER</a>
    <a href="#" class="nav-item">EKİP ÜYESİ ALIMLARI <span style="background:#e91e63; color:white; font-size:0.6rem; padding:2px 4px; border-radius:2px;">YENİ</span></a>
    <!-- INSTAGRAM LİNKİ BURAYA EKLENDİ -->
    <a href="https://www.instagram.com/dmnldag_omer/" target="_blank" class="nav-item">İLETİŞİM</a>
</div>

<div class="alphabet-bar">
    <button class="alpha-btn">#</button>
    <script>
        "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ".split("").forEach(l => {
            document.write(`<button class="alpha-btn">${l}</button>`);
        });
    </script>
</div>

<div class="container">
    <div class="main-content">
        <div class="video-wrapper">
            <iframe id="vidFrame" src="" allowfullscreen></iframe>
        </div>
        <h2 id="vidTitle" style="margin:15px 0 5px 0; font-size: 1.2rem;">Yükleniyor...</h2>
        <p style="color:#888; font-size:0.8rem; margin-bottom:20px;">Çeviri & Edit: <b>Banga Subs</b></p>

        <div class="comment-section">
            <h3 style="margin:0 0 15px 0; font-size: 1rem;">Bölüm Yorumları</h3>
            <input type="text" id="commInp" class="comment-input" placeholder="Yorumunuzu yazın...">
            <button onclick="saveComm()" class="btn-post">GÖNDER</button>
            <div id="commList" class="comment-list">Yorumlar yükleniyor...</div>
        </div>
    </div>

    <div class="sidebar">
        <h3 id="sideTitle">Bölümler</h3>
        <div id="epList"></div>
    </div>
</div>

<div class="footer">
    Banga Subs © 2026 | Geliştirici: Necati Ömer
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAk1x2v8ji1rlCwsXiRGhTGSL3bBiuakRk",
    authDomain: "banga-8f48d.firebaseapp.com",
    projectId: "banga-8f48d",
    storageBucket: "banga-8f48d.firebasestorage.app",
    messagingSenderId: "795200261757",
    appId: "1:795200261757:web:ed820a5eb1a5f84c7f6b14"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const animes = {
    dandadan: {
      name: "Dandadan",
      eps: [
        { t: "1. Bölüm", l: "https://drive.google.com/file/d/1r1R6vWimlZVcIqQNppzL1T3g-V6rVV7Z/preview" },
        { t: "2. Bölüm", l: "https://drive.google.com/file/d/1x5ky5Eumj3-uZ7kNenThrn7EgHhztU0v/preview" },
        { t: "3. Bölüm", l: "https://drive.google.com/file/d/11VLIHmbEmrx3L3mPokqkpSbN2smXPg9e/preview" }
      ]
    },
    jjk: {
      name: "Jujutsu Kaisen",
      eps: [
        { t: "1. Sezon Tüm Bölümler", l: "https://drive.google.com/file/d/1DawUU843Qeo02PUoKRZ2HamQc-HVbuI5/preview" }
      ]
    }
  };

  function searchAnime() {
    let input = document.getElementById('animeSearch').value.toLowerCase();
    if(input.includes("jjk") || input.includes("jujutsu")) loadAnime('jjk');
    if(input.includes("dandadan")) loadAnime('dandadan');
  }

  function loadAnime(key) {
    const a = animes[key];
    document.getElementById('sideTitle').innerText = a.name + " Bölümleri";
    const list = document.getElementById('epList');
    list.innerHTML = "";
    a.eps.forEach(e => {
        let d = document.createElement('div');
        d.className = "ep-link";
        d.innerText = e.t;
        d.onclick = () => {
            document.getElementById('vidFrame').src = e.l;
            document.getElementById('vidTitle').innerText = a.name + " - " + e.t;
        };
        list.appendChild(d);
    });
    document.getElementById('vidFrame').src = a.eps[0].l;
    document.getElementById('vidTitle').innerText = a.name + " - " + a.eps[0].t;
  }

  window.onload = () => {
    if(!localStorage.getItem("banga_user")) {
        let u = prompt("Banga Subs'a hoş geldin! İsmin nedir?");
        localStorage.setItem("banga_user", u || "Misafir");
    }
    loadAnime('dandadan');
    getComms();
  };

  async function saveComm() {
    let v = document.getElementById("commInp").value;
    if(!v.trim()) return;
    await db.collection("comments").add({ u: localStorage.getItem("banga_user"), t: v, d: new Date() });
    document.getElementById("commInp").value = "";
  }

  function getComms() {
    db.collection("comments").orderBy("d", "desc").onSnapshot(s => {
        let h = "";
        s.forEach(doc => { h += `<div class="c-item"><span class="c-user">${doc.data().u}:</span> ${doc.data().t}</div>`; });
        document.getElementById("commList").innerHTML = h || "Henüz yorum yok.";
    });
  }
</script>
</body>
</html>
